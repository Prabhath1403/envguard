# .env.schema.toml
# Schema definition for environment variables

[DATABASE_URL]
required = true
format = "url"
description = "PostgreSQL connection string with credentials"

[DB_POOL_SIZE]
required = false
format = "int"
default = "10"
description = "Maximum number of database connections in the pool"

[APP_NAME]
required = true
format = "string"
description = "Application name displayed in UI and logs"

[DEBUG]
required = false
format = "bool"
default = "false"
description = "Enable debug mode (should be false in production)"

[PORT]
required = false
format = "int"
default = "8000"
description = "Port number for the application server"

[SECRET_KEY]
required = true
format = "string"
description = "Secret key for cryptographic operations (min 32 characters)"

[JWT_SECRET]
required = true
format = "string"
description = "Secret key for JWT token signing"

[API_TOKEN]
required = true
format = "string"
description = "API token for external service authentication"

[REDIS_URL]
required = true
format = "url"
description = "Redis connection URL for caching"

[SMTP_HOST]
required = true
format = "string"
description = "SMTP server hostname for sending emails"

[SMTP_PORT]
required = true
format = "int"
description = "SMTP server port"

[SMTP_USER]
required = true
format = "string"
description = "SMTP authentication username"

[SMTP_PASSWORD]
required = true
format = "string"
description = "SMTP authentication password"

[ENABLE_REGISTRATION]
required = false
format = "bool"
default = "true"
description = "Allow new user registration"

[ENABLE_EMAIL_VERIFICATION]
required = false
format = "bool"
default = "true"
description = "Require email verification for new users"

[MAX_UPLOAD_SIZE]
required = false
format = "int"
default = "10485760"
description = "Maximum file upload size in bytes"

[LOG_LEVEL]
required = false
format = "string"
default = "info"
description = "Logging level (debug, info, warning, error, critical)"

[SENTRY_DSN]
required = false
format = "string"
description = "Sentry DSN for error tracking (optional)"
